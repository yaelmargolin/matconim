<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Notes</title>
<style>
  /* ---------- design tokens ---------- */
  :root {
    --bg: #f5f1ea;          /* warm paper */
    --bg-alt: #ece5d8;
    --panel: #fbf8f2;
    --line: #d9cfbe;
    --line-soft: #e7dfcf;
    --ink: #1f1b16;
    --ink-soft: #6a5f50;
    --ink-faint: #998a76;
    --accent: #b3543a;       /* warm rust */
    --accent-soft: #f0d6c8;
    --accent-deep: #8c3a23;
    --selected: #f0e6d2;
    --shadow: 0 1px 0 rgba(31,27,22,.04), 0 6px 24px -10px rgba(31,27,22,.10);
    --radius: 10px;
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
    --serif: "Iowan Old Style", "Charter", Georgia, "Frank Ruhl Libre", "David", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", "SF Pro Text",
            "Heebo", "Arial Hebrew", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--bg);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  button { font: inherit; color: inherit; cursor: pointer; }
  input, textarea, select { font: inherit; color: inherit; }
  ::selection { background: var(--accent-soft); }

  /* ---------- shell ---------- */
  .app {
    display: grid;
    grid-template-columns: 240px 340px 1fr;
    grid-template-rows: 56px 1fr;
    height: 100vh;
    width: 100vw;
  }
  .topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  .brand {
    font-family: var(--serif);
    font-size: 18px;
    letter-spacing: .2px;
    font-weight: 600;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .brand-mark {
    width: 22px; height: 22px;
    background: var(--accent);
    border-radius: 6px;
    display: grid; place-items: center;
    color: var(--panel);
    font-size: 13px; font-weight: 700;
    font-family: var(--serif);
  }
  .search-wrap {
    flex: 1; max-width: 560px;
    display: flex; align-items: center; gap: 8px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 14px;
  }
  .search-wrap:focus-within { border-color: var(--accent); }
  .search-wrap input {
    flex: 1; border: 0; background: transparent; outline: none;
    font-size: 14px;
  }
  .search-wrap .hint { font-size: 11px; color: var(--ink-faint); white-space: nowrap; }
  .top-actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    padding: 7px 12px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #fff;
    font-size: 13px;
    transition: all .12s ease;
  }
  .btn:hover { border-color: var(--ink-faint); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: var(--accent-deep); border-color: var(--accent-deep); }
  .btn.ghost { border-color: transparent; background: transparent; color: var(--ink-soft); }
  .btn.ghost:hover { background: var(--bg-alt); color: var(--ink); }
  .btn.danger:hover { color: var(--accent-deep); border-color: var(--accent-deep); }

  /* ---------- folders pane ---------- */
  .folders {
    background: var(--bg-alt);
    border-right: 1px solid var(--line);
    overflow-y: auto;
    padding: 12px 8px;
  }
  .folder-section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--ink-faint);
    padding: 12px 12px 4px;
    font-weight: 600;
  }
  .folder-row {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px;
    border-radius: 7px;
    cursor: pointer;
    color: var(--ink);
    user-select: none;
    font-size: 13.5px;
  }
  .folder-row:hover { background: rgba(0,0,0,.04); }
  .folder-row.active {
    background: var(--accent);
    color: #fff;
  }
  .folder-row.active .folder-count { color: rgba(255,255,255,.85); }
  .folder-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .folder-count {
    font-size: 11.5px;
    color: var(--ink-faint);
    font-variant-numeric: tabular-nums;
  }
  .folder-icon {
    width: 14px; height: 14px;
    flex-shrink: 0;
    opacity: .7;
  }

  /* ---------- note list pane ---------- */
  .notelist {
    background: var(--panel);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .notelist-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
  }
  .notelist-title {
    font-weight: 600;
    font-size: 13.5px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .notelist-meta { font-size: 11px; color: var(--ink-faint); white-space: nowrap; }
  .notelist-scroll {
    flex: 1; overflow-y: auto;
  }
  .note-item {
    padding: 11px 14px;
    border-bottom: 1px solid var(--line-soft);
    cursor: pointer;
  }
  .note-item:hover { background: rgba(0,0,0,.025); }
  .note-item.active { background: var(--selected); }
  .note-item-title {
    font-weight: 600;
    font-size: 13.5px;
    color: var(--ink);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    word-break: break-word;
  }
  .note-item-meta {
    font-size: 11.5px;
    color: var(--ink-faint);
    margin-top: 3px;
    display: flex; gap: 6px; align-items: center;
  }
  .note-item-snippet {
    font-size: 12.5px;
    color: var(--ink-soft);
    margin-top: 4px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    word-break: break-word;
    white-space: pre-wrap;
  }
  mark {
    background: #fde9b8;
    color: var(--ink);
    padding: 0 2px;
    border-radius: 2px;
  }

  /* ---------- editor pane ---------- */
  .editor {
    background: var(--bg);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .editor-toolbar {
    padding: 10px 18px;
    border-bottom: 1px solid var(--line);
    display: flex; gap: 8px; align-items: center; justify-content: space-between;
    background: var(--panel);
  }
  .editor-toolbar-left, .editor-toolbar-right {
    display: flex; gap: 6px; align-items: center;
  }
  .editor-meta {
    font-size: 11.5px; color: var(--ink-faint);
    margin: 0 8px;
  }
  .editor-scroll {
    flex: 1; overflow-y: auto;
    padding: 28px 56px 80px;
  }
  .editor-inner { max-width: 760px; margin: 0 auto; }
  .editor-title {
    width: 100%;
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 700;
    border: 0;
    background: transparent;
    outline: none;
    padding: 6px 0;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 14px;
  }
  .editor-title-static {
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 700;
    line-height: 1.2;
    margin: 6px 0 14px;
    word-break: break-word;
  }
  .editor-body, .editor-body-static {
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.65;
    color: var(--ink);
  }
  .editor-body {
    width: 100%;
    border: 0;
    background: transparent;
    outline: none;
    resize: none;
    min-height: 60vh;
    padding: 0;
  }
  .editor-body-static {
    white-space: pre-wrap;
    word-break: break-word;
  }
  .editor-body-static img {
    max-width: 100%;
    border-radius: 8px;
    margin: 14px 0;
    display: block;
    box-shadow: 0 2px 14px -4px rgba(0,0,0,.18);
  }
  .empty-state {
    height: 100%;
    display: grid; place-items: center;
    color: var(--ink-faint);
    font-family: var(--serif);
    font-size: 18px;
  }
  .empty-state .es-inner { text-align: center; max-width: 360px; padding: 0 20px; }
  .empty-state h2 { font-size: 22px; margin: 0 0 10px; color: var(--ink); }
  .empty-state p { margin: 0; line-height: 1.55; font-size: 14px; font-family: var(--sans); }

  /* ---------- top status & toast ---------- */
  .status-pill {
    font-size: 12px;
    color: var(--ink-soft);
    background: var(--bg-alt);
    padding: 5px 10px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .status-pill.ok { color: #2f6b3a; background: #d8ebd8; }
  .status-pill.warn { color: #8a5a00; background: #fbeac6; }
  .status-pill.err { color: #a02020; background: #f5d6d6; }

  .toast {
    position: fixed;
    bottom: 22px; left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: #fff;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    box-shadow: 0 10px 30px -10px rgba(0,0,0,.4);
    opacity: 0;
    transition: opacity .15s ease;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; }

  /* ---------- modal (open folder picker / first run) ---------- */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(31,27,22,.55);
    display: grid; place-items: center;
    z-index: 50;
  }
  .modal {
    background: var(--panel);
    width: min(560px, 92vw);
    border-radius: 14px;
    padding: 28px 30px;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,.45);
  }
  .modal h2 {
    font-family: var(--serif);
    font-size: 24px;
    margin: 0 0 8px;
  }
  .modal p { color: var(--ink-soft); margin: 0 0 18px; line-height: 1.55; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  /* RTL hint: each text block gets dir=auto so Hebrew flows correctly per-line */
  [dir="auto"] { unicode-bidi: plaintext; }

  /* small icon helpers */
  svg.icon { width: 14px; height: 14px; flex-shrink: 0; }
</style>
</head>
<body>

<div class="app" id="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">N</div>
      <div>Notes</div>
    </div>
    <div class="search-wrap">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="search" type="search" placeholder="Search all notes…" autocomplete="off" />
      <span class="hint" id="searchHint"></span>
    </div>
    <div class="top-actions">
      <span id="statusPill" class="status-pill">Read-only</span>
      <button class="btn ghost" id="enableSaveBtn" title="Pick the aNote_App folder to enable saving">Enable saving</button>
      <button class="btn primary" id="newNoteBtn">+ New note</button>
    </div>
  </header>

  <aside class="folders" id="folders"></aside>
  <section class="notelist">
    <div class="notelist-header">
      <div class="notelist-title" id="notelistTitle">All notes</div>
      <div class="notelist-meta" id="notelistMeta"></div>
    </div>
    <div class="notelist-scroll" id="notelist"></div>
  </section>

  <main class="editor" id="editor">
    <div class="empty-state" id="emptyState">
      <div class="es-inner">
        <h2>Pick a note</h2>
        <p>Choose a folder on the left to browse, or use the search bar to find anything across all 4,730 notes.</p>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>


<script>
/* ===== state ===== */
const state = {
  data: null,                // { folders, notes, ... }
  folderId: '__all__',
  selectedNoteId: null,
  searchQuery: '',
  editing: false,
  dirHandle: null,           // FileSystemDirectoryHandle for the aNote_App folder
  imagesHandle: null,
  unsavedChanges: false,
};

/* ===== util ===== */
const $ = (id) => document.getElementById(id);
const escHtml = (s) => (s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const escAttr = (s) => escHtml(s);

function toast(msg, ms = 1800) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), ms);
}
function setStatus(text, kind = '') {
  const p = $('statusPill');
  p.textContent = text;
  p.className = 'status-pill ' + kind;
}

function fmtDate(iso) {
  if (!iso) return '';
  // hide bogus dates (epoch ~ 0)
  if (iso.startsWith('-') || iso.startsWith('19') && iso < '1990') return '';
  const d = new Date(iso + 'Z');
  if (isNaN(d)) return '';
  const now = new Date();
  const sameYear = d.getFullYear() === now.getFullYear();
  const opts = sameYear
    ? { month: 'short', day: 'numeric' }
    : { year: 'numeric', month: 'short', day: 'numeric' };
  return d.toLocaleDateString(undefined, opts);
}
function fmtDateLong(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'Z');
  if (isNaN(d)) return '';
  return d.toLocaleString(undefined, { dateStyle: 'long', timeStyle: 'short' });
}

/* ===== loading the data ===== */
async function loadData() {
  // Always fetch via relative URL so it works from file:// or http://
  try {
    const r = await fetch('./notes.json');
    if (!r.ok) throw new Error(r.statusText);
    state.data = await r.json();
  } catch (e) {
    setStatus('Could not load notes.json', 'err');
    $('emptyState').innerHTML = `<div class="es-inner">
      <h2>notes.json not found</h2>
      <p>Open this app via a local web server (or in Chrome/Edge) so it can read <code>notes.json</code> next to <code>index.html</code>. From this folder, run:<br/>
      <code style="display:inline-block;margin-top:8px;background:#000;color:#fff;padding:6px 10px;border-radius:4px;">python3 -m http.server 8000</code><br/>
      then open <code>http://localhost:8000/</code>.</p>
    </div>`;
    throw e;
  }
}

/* ===== folder + note list rendering ===== */
function renderFolders() {
  const el = $('folders');
  const counts = {};
  for (const n of state.data.notes) counts[n.folder_id] = (counts[n.folder_id] || 0) + 1;
  const folders = state.data.folders.slice().sort((a, b) => (a.sort_order ?? 999) - (b.sort_order ?? 999));

  let html = `<div class="folder-section-label">Library</div>`;
  for (const item of [
    { id: '__all__', name: 'All notes', count: state.data.notes.length, icon: 'all' },
  ]) {
    html += renderFolderRow(item);
  }
  html += `<div class="folder-section-label">Folders</div>`;
  for (const f of folders) {
    const c = counts[f.id] || 0;
    if (c === 0) continue; // hide empty default folders
    html += renderFolderRow({ id: f.id, name: f.name, count: c });
  }
  // include any empty folders at the bottom (so user can move notes into them)
  const emptyFolders = folders.filter(f => !counts[f.id]);
  if (emptyFolders.length) {
    html += `<div class="folder-section-label">Empty</div>`;
    for (const f of emptyFolders) html += renderFolderRow({ id: f.id, name: f.name, count: 0 });
  }
  el.innerHTML = html;
  el.querySelectorAll('.folder-row').forEach(row => {
    row.addEventListener('click', () => selectFolder(row.dataset.id));
  });
}
function renderFolderRow({ id, name, count }) {
  const active = state.folderId === id ? ' active' : '';
  const icon = id === '__all__'
    ? `<svg class="folder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>`
    : `<svg class="folder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>`;
  return `<div class="folder-row${active}" data-id="${escAttr(id)}">
    ${icon}
    <div class="folder-name" dir="auto">${escHtml(name)}</div>
    <div class="folder-count">${count}</div>
  </div>`;
}

function selectFolder(id) {
  state.folderId = id;
  state.selectedNoteId = null;
  state.editing = false;
  renderFolders();
  renderNoteList();
  renderEditor();
}

function getFolderName(id) {
  if (id === '__all__') return 'All notes';
  const f = state.data.folders.find(x => x.id === id);
  return f ? f.name : '(unknown folder)';
}

function getFilteredNotes() {
  let notes = state.data.notes;
  if (state.folderId !== '__all__') {
    notes = notes.filter(n => n.folder_id === state.folderId);
  }
  if (state.searchQuery) {
    const q = state.searchQuery.toLowerCase();
    notes = notes.filter(n =>
      (n.title || '').toLowerCase().includes(q) ||
      (n.body || '').toLowerCase().includes(q)
    );
  }
  // sort by modified desc, fallback created
  notes = notes.slice().sort((a, b) => (b.modified || b.created || '').localeCompare(a.modified || a.created || ''));
  return notes;
}

function snippetFor(body, q) {
  const text = stripMarkup(body || '').replace(/\s+/g, ' ').trim();
  if (!q) return text.slice(0, 120);
  const lower = text.toLowerCase();
  const i = lower.indexOf(q.toLowerCase());
  if (i < 0) return text.slice(0, 120);
  const start = Math.max(0, i - 40);
  const end = Math.min(text.length, i + q.length + 80);
  let s = text.slice(start, end);
  if (start > 0) s = '… ' + s;
  if (end < text.length) s = s + ' …';
  return highlight(s, q);
}
function highlight(s, q) {
  if (!q) return escHtml(s);
  const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'ig');
  return escHtml(s).replace(re, m => `<mark>${m}</mark>`);
}

function renderNoteList() {
  const notes = getFilteredNotes();
  $('notelistTitle').textContent = state.searchQuery
    ? `Search: "${state.searchQuery}"`
    : getFolderName(state.folderId);
  $('notelistMeta').textContent = `${notes.length} ${notes.length === 1 ? 'note' : 'notes'}`;
  const el = $('notelist');
  if (notes.length === 0) {
    el.innerHTML = `<div style="padding:40px 20px;color:var(--ink-faint);text-align:center;font-size:13px">No notes here</div>`;
    return;
  }
  // Cap to first 500 in list for perf; user can search to narrow
  const shown = notes.slice(0, 500);
  el.innerHTML = shown.map(n => `
    <div class="note-item ${state.selectedNoteId === n.id ? 'active' : ''}" data-id="${escAttr(n.id)}">
      <div class="note-item-title" dir="auto">${highlight(n.title || '(untitled)', state.searchQuery)}</div>
      <div class="note-item-meta">${escHtml(fmtDate(n.modified || n.created))}</div>
      <div class="note-item-snippet" dir="auto">${snippetFor(n.body, state.searchQuery)}</div>
    </div>
  `).join('') + (notes.length > shown.length
      ? `<div style="padding:14px;color:var(--ink-faint);font-size:12px;text-align:center">Showing 500 of ${notes.length}. Refine search to see more.</div>`
      : '');
  el.querySelectorAll('.note-item').forEach(row => {
    row.addEventListener('click', () => selectNote(row.dataset.id));
  });
}

function selectNote(id) {
  if (state.editing && state.unsavedChanges) {
    if (!confirm('Discard unsaved changes?')) return;
  }
  state.selectedNoteId = id;
  state.editing = false;
  state.unsavedChanges = false;
  renderNoteList();
  renderEditor();
}

/* ===== editor ===== */
function renderEditor() {
  const el = $('editor');
  if (!state.selectedNoteId) {
    el.innerHTML = `<div class="empty-state"><div class="es-inner">
      <h2>Pick a note</h2>
      <p>Choose a folder on the left, or search across all your notes.</p>
    </div></div>`;
    return;
  }
  const n = state.data.notes.find(x => x.id === state.selectedNoteId);
  if (!n) { el.innerHTML = ''; return; }
  const folderOptions = state.data.folders
    .filter(f => f.id) // skip nulls
    .map(f => `<option value="${escAttr(f.id)}" ${f.id === n.folder_id ? 'selected' : ''}>${escHtml(f.name)}</option>`).join('');

  if (state.editing) {
    el.innerHTML = `
      <div class="editor-toolbar">
        <div class="editor-toolbar-left">
          <button class="btn primary" id="saveBtn">Save</button>
          <button class="btn ghost" id="cancelBtn">Cancel</button>
          <span class="editor-meta">Editing</span>
        </div>
        <div class="editor-toolbar-right">
          <select id="moveSelect" class="btn" title="Folder">${folderOptions}</select>
          <button class="btn ghost" id="insertImgBtn" title="Attach an image">+ Image</button>
          <input type="file" id="imgFile" accept="image/*" style="display:none" />
        </div>
      </div>
      <div class="editor-scroll">
        <div class="editor-inner">
          <input class="editor-title" id="editTitle" dir="auto" value="${escAttr(n.title)}" />
          <textarea class="editor-body" id="editBody" dir="auto">${escHtml(n.body)}</textarea>
        </div>
      </div>
    `;
    // wire
    const markDirty = () => { state.unsavedChanges = true; };
    $('editTitle').addEventListener('input', markDirty);
    $('editBody').addEventListener('input', markDirty);
    $('saveBtn').addEventListener('click', saveCurrent);
    $('cancelBtn').addEventListener('click', cancelEdit);
    $('moveSelect').addEventListener('change', markDirty);
    $('insertImgBtn').addEventListener('click', () => $('imgFile').click());
    $('imgFile').addEventListener('change', (e) => insertImage(e.target.files[0]));
    autoSizeTextarea($('editBody'));
    setTimeout(() => $('editTitle').focus(), 30);
  } else {
    el.innerHTML = `
      <div class="editor-toolbar">
        <div class="editor-toolbar-left">
          <button class="btn primary" id="editBtn">Edit</button>
          <span class="editor-meta">${escHtml(getFolderName(n.folder_id))}${fmtDateLong(n.modified) ? ' · Modified ' + escHtml(fmtDateLong(n.modified)) : ''}</span>
        </div>
        <div class="editor-toolbar-right">
          <button class="btn ghost danger" id="deleteBtn">Delete</button>
        </div>
      </div>
      <div class="editor-scroll">
        <div class="editor-inner">
          <div class="editor-title-static" dir="auto">${escHtml(n.title || '(untitled)')}</div>
          <div class="editor-body-static" dir="auto">${renderBody(n.body)}</div>
        </div>
      </div>
    `;
    $('editBtn').addEventListener('click', () => { state.editing = true; renderEditor(); });
    $('deleteBtn').addEventListener('click', deleteCurrent);
  }
}

function autoSizeTextarea(t) {
  const fit = () => { t.style.height = 'auto'; t.style.height = (t.scrollHeight + 8) + 'px'; };
  fit();
  t.addEventListener('input', fit);
}

/* ===== aNote markup -> HTML rendering ===== */
function renderBody(body) {
  if (!body) return '<div style="color:var(--ink-faint);font-style:italic">(empty note)</div>';
  // Strip <@font:..> tags entirely (we don't honor custom font sizes)
  let s = body.replace(/<@font[^>]*>/g, '').replace(/<\/@font>/g, '');
  // headings
  s = s.replace(/<@h1>([\s\S]*?)<\/@h1>/g, (_,c) => `<h1 style="font-size:24px;margin:14px 0 8px;font-family:var(--serif)">${escHtml(c)}</h1>`);
  s = s.replace(/<@h2>([\s\S]*?)<\/@h2>/g, (_,c) => `<h2 style="font-size:20px;margin:12px 0 6px;font-family:var(--serif)">${escHtml(c)}</h2>`);
  // tokenize: split out tags so we can escape the rest
  // Replace markup with placeholders, escape, then restore
  const repl = [];
  s = s.replace(/<\/?@(b|i|u)>|<@media\s+[^>]*?\/>/g, m => {
    repl.push(m);
    return `${repl.length - 1}`;
  });
  s = escHtml(s);
  s = s.replace(/(\d+)/g, (_, i) => {
    const tag = repl[+i];
    if (tag === '<@b>') return '<strong>';
    if (tag === '</@b>') return '</strong>';
    if (tag === '<@i>') return '<em>';
    if (tag === '</@i>') return '</em>';
    if (tag === '<@u>') return '<u>';
    if (tag === '</@u>') return '</u>';
    const m = tag.match(/filename=['"]([^'"]+)['"]/);
    if (m) {
      const fn = m[1];
      return `<img src="images/${encodeURIComponent(fn)}" alt="" loading="lazy" onerror="this.style.display='none'"/>`;
    }
    return '';
  });
  // Newlines -> <br>
  s = s.replace(/\n/g, '<br>');
  return s;
}

function stripMarkup(body) {
  if (!body) return '';
  return body
    .replace(/<@media[^>]*?\/>/g, ' [image] ')
    .replace(/<\/?@[a-z0-9_]+(?::[^>]*)?>/gi, '');
}

/* ===== editing actions ===== */
function cancelEdit() {
  if (state.unsavedChanges && !confirm('Discard changes?')) return;
  state.editing = false; state.unsavedChanges = false;
  renderEditor();
}
async function saveCurrent() {
  const n = state.data.notes.find(x => x.id === state.selectedNoteId);
  if (!n) return;
  n.title = $('editTitle').value;
  n.body = $('editBody').value;
  n.folder_id = $('moveSelect').value;
  n.modified = new Date().toISOString().slice(0, 19);
  state.editing = false; state.unsavedChanges = false;
  renderFolders(); renderNoteList(); renderEditor();
  await persist();
}
async function deleteCurrent() {
  if (!confirm('Delete this note? This cannot be undone.')) return;
  const idx = state.data.notes.findIndex(x => x.id === state.selectedNoteId);
  if (idx < 0) return;
  state.data.notes.splice(idx, 1);
  state.selectedNoteId = null;
  renderFolders(); renderNoteList(); renderEditor();
  await persist();
}
function newNote() {
  const id = (crypto.randomUUID ? crypto.randomUUID() : ('new-' + Date.now())).toUpperCase();
  const folderId = state.folderId !== '__all__'
    ? state.folderId
    : (state.data.folders[0] && state.data.folders[0].id);
  const now = new Date().toISOString().slice(0, 19);
  const n = { id, title: 'New note', body: '', folder_id: folderId, created: now, modified: now };
  state.data.notes.unshift(n);
  state.selectedNoteId = id;
  state.editing = true;
  state.unsavedChanges = false;
  renderFolders(); renderNoteList(); renderEditor();
}

async function insertImage(file) {
  if (!file) return;
  if (!state.imagesHandle) {
    toast('Enable saving first to attach images');
    return;
  }
  const ext = (file.name.match(/\.[a-z0-9]+$/i) || ['.jpg'])[0];
  const fname = `img_${(crypto.randomUUID ? crypto.randomUUID() : Date.now()).toString().toUpperCase()}${ext}`;
  try {
    const fh = await state.imagesHandle.getFileHandle(fname, { create: true });
    const w = await fh.createWritable();
    await w.write(await file.arrayBuffer());
    await w.close();
    const tag = `<@media type='${file.type || 'image/jpeg'}' filename='${fname}'/>`;
    const ta = $('editBody');
    const start = ta.selectionStart || ta.value.length;
    ta.value = ta.value.slice(0, start) + '\n' + tag + '\n' + ta.value.slice(start);
    state.unsavedChanges = true;
    toast('Image attached');
    autoSizeTextarea(ta);
  } catch (e) {
    console.error(e);
    toast('Could not save image: ' + e.message);
  }
}

/* ===== IndexedDB handle persistence ===== */
function openIDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('notesApp', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('handles');
    req.onsuccess = e => res(e.target.result);
    req.onerror = rej;
  });
}
async function saveHandleToIDB(handle) {
  try {
    const db = await openIDB();
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(handle, 'appDir');
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
  } catch {}
}
async function loadHandleFromIDB() {
  try {
    const db = await openIDB();
    return await new Promise((res, rej) => {
      const tx = db.transaction('handles', 'readonly');
      const req = tx.objectStore('handles').get('appDir');
      req.onsuccess = () => res(req.result);
      req.onerror = rej;
    });
  } catch { return null; }
}

/* ===== persistence ===== */
async function persist() {
  if (!state.dirHandle) {
    toast('Changes kept in memory. Click "Enable saving" to write to disk.');
    return;
  }
  try {
    const fh = await state.dirHandle.getFileHandle('notes.json', { create: true });
    const w = await fh.createWritable();
    await w.write(JSON.stringify(state.data));
    await w.close();
    setStatus('Saved · ' + new Date().toLocaleTimeString(), 'ok');
  } catch (e) {
    console.error(e);
    setStatus('Save failed', 'err');
    toast('Save failed: ' + e.message);
  }
}

async function applyDirHandle(dh) {
  state.dirHandle = dh;
  try {
    state.imagesHandle = await dh.getDirectoryHandle('images', { create: true });
  } catch {}
  await saveHandleToIDB(dh);
  setStatus('Editing enabled', 'ok');
}

async function pickAppFolder() {
  if (!('showDirectoryPicker' in window)) {
    toast('This browser does not support folder access. Use Chrome or Edge for editing.');
    return;
  }
  try {
    const dh = await window.showDirectoryPicker({ mode: 'readwrite' });
    try {
      await dh.getFileHandle('notes.json');
    } catch {
      if (!confirm('That folder does not contain a notes.json. Continue anyway?')) return;
    }
    await applyDirHandle(dh);
  } catch (e) {
    if (e.name !== 'AbortError') toast('Could not enable saving: ' + e.message);
  }
}

async function tryRestoreHandle() {
  const dh = await loadHandleFromIDB();
  if (!dh) return;
  try {
    const perm = await dh.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      await applyDirHandle(dh);
    } else {
      const req = await dh.requestPermission({ mode: 'readwrite' });
      if (req === 'granted') await applyDirHandle(dh);
    }
  } catch {}
}

/* ===== boot ===== */
window.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's' && state.editing) {
    e.preventDefault(); saveCurrent();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault(); $('search').focus();
  }
  if (e.key === 'Escape' && state.editing) {
    cancelEdit();
  }
});

$('search').addEventListener('input', (e) => {
  state.searchQuery = e.target.value.trim();
  renderNoteList();
});
$('newNoteBtn').addEventListener('click', newNote);
$('enableSaveBtn').addEventListener('click', pickAppFolder);

(async () => {
  try {
    await loadData();
  } catch { return; }
  renderFolders();
  renderNoteList();
  setStatus(`${state.data.notes.length} notes · read-only`);
  await tryRestoreHandle();
})();
</script>
</body>
</html>
